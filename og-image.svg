<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffd600"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1090" cy="228" r="43" fill="#880e4f" opacity="0.11"/>
    <circle cx="228" cy="591" r="78" fill="#880e4f" opacity="0.20"/>
    <circle cx="242" cy="568" r="21" fill="#880e4f" opacity="0.08"/>
    <circle cx="798" cy="-51" r="29" fill="#880e4f" opacity="0.11"/>
    <circle cx="927" cy="18" r="37" fill="#880e4f" opacity="0.16"/>
    <circle cx="238" cy="27" r="54" fill="#880e4f" opacity="0.17"/>
    <rect x="793" y="366" width="90" height="58" rx="8" fill="#b71c1c" opacity="0.15" transform="rotate(8, 691, 512)"/>
    <rect x="684" y="598" width="55" height="45" rx="8" fill="#b71c1c" opacity="0.10" transform="rotate(44, -30, -84)"/>
    <rect x="243" y="16" width="22" height="42" rx="8" fill="#b71c1c" opacity="0.10" transform="rotate(0, 1014, 165)"/>
    <rect x="1206" y="606" width="89" height="22" rx="8" fill="#b71c1c" opacity="0.12" transform="rotate(22, 810, 555)"/>
    <rect x="832" y="199" width="65" height="61" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(20, 524, 535)"/>
    <rect x="1182" y="290" width="43" height="91" rx="8" fill="#b71c1c" opacity="0.07" transform="rotate(27, 298, 293)"/>
    <rect x="499" y="-28" width="68" height="87" rx="8" fill="#b71c1c" opacity="0.14" transform="rotate(8, 164, 136)"/>
    <rect x="826" y="296" width="51" height="27" rx="8" fill="#b71c1c" opacity="0.09" transform="rotate(36, 671, 132)"/>
    <polygon points="6,385 101,575 -89,575" fill="#880e4f" opacity="0.05"/>
    <polygon points="-4,541 22,593 -30,593" fill="#880e4f" opacity="0.05"/>
    <polygon points="476,533 550,681 402,681" fill="#880e4f" opacity="0.11"/>
    <polygon points="998,539 1057,657 939,657" fill="#880e4f" opacity="0.03"/>

  <!-- Wave at bottom -->
  <path d="M0,560 C360,595 840,525 1200,560 L1200,630 L0,630Z" fill="#880e4f" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    가산 프로그램 개발 추천
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    가산 — 프로그램 개발
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#ffd600" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#ffd600" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    가산 가산 프로그램 개발 추천 — 프로그램 개발
  </text>
</svg>